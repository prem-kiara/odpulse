server {
    listen 80;
    server_name odpulse.dhanamfinance.com;

    # Allow large report uploads (pool report, accrued interest report).
    # Backend multer cap is 150 MB; 200 MB here gives headroom for multipart overhead.
    client_max_body_size 200M;

    root /home/ubuntu/odpulse/dist;
    index index.html;

    # Proxy API requests to Express backend
    location /api/ {
        # Upload size cap (also set at server level for safety).
        client_max_body_size 200M;

        # SQLite ingest of large CSVs can take 15-60s; default 60s proxy read
        # timeout truncates the response. Match the vite dev proxy (10 min).
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Handle React SPA routing - all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
